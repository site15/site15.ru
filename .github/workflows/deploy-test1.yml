name: "Deploy to test1"

on:
  push:
    branches: [feature/18]

jobs:
  delivery-to-server:
    name: Delivery to server
    environment: test1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          # We must fetch at least the immediate parents so that if this is
          # a pull request then we can checkout the head.
          fetch-depth: 2

      - name: Cache node_modules
        id: cache_node_modules
        uses: actions/cache@v2
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install packages
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash
          . ~/.nvm/nvm.sh
          nvm --version
          nvm install
          nvm use
          npm ci --force
          npm install
        if: ${{steps.cache_node_modules.outputs.cache-hit != 'true' }}

      - name: Run e2e tests
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.SITE15_ACCESS_TOKEN_DOCKER }}
        run: |
          cd devops
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash
          . ~/.nvm/nvm.sh
          nvm --version
          nvm install
          nvm use
          npm ci --force
          npm run docker:prod:up:local
          npm run test:local
          npm run docker:prod:down

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v3
        if: always() # always run even if the previous step fails
        with:
          report_paths: "junit.xml"

      - name: Build
        env:
          CI_REGISTRY_PASSWORD: ${{ secrets.SITE15_ACCESS_TOKEN_DOCKER }}
        run: |
          cd devops
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.1/install.sh | bash
          . ~/.nvm/nvm.sh
          nvm --version
          nvm install
          nvm use
          npm ci --force
          npm run docker:prod:build-all-sources
          npm run docker:prod:build-server-base-image
          npm run docker:prod:build-all-images
