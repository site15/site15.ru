version: "3"
networks:
    site15-network:
        ipam:
            config:
                - subnet: "172.10.0.0/16"

volumes:
    site15-postgres-volume:
        external: true

services:
    site15-postgres:
        image: "endykaufman/postgres-default"
        container_name: "site15-postgres"
        environment:
            - POSTGRES_USER=${ROOT_POSTGRES_USER}
            - POSTGRES_PASSWORD=${ROOT_POSTGRES_PASSWORD}
            - POSTGRES_DB=postgres
        ports:
            - "5432:5432"
        volumes:
            - site15-postgres-volume:/var/lib/postgresql/data
        networks:
            - site15-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        tty: true

    site15-client:
        image: ${CI_PROJECT_NAME}-client-${TAG_VERSION}
        container_name: "site15-client"
        networks:
            - site15-network
        ports:
            - "9090:9090"
        tty: true
        depends_on:
            site15-server:
                condition: service_healthy

    site15-server:
        image: ${CI_PROJECT_NAME}-${TAG_VERSION}
        user: ${CURRENT_UID}
        container_name: "site15-server"
        environment:
            - HOST=${HOST}
            - PROJECT_DOMAIN=${PROJECT_DOMAIN}
            - PROJECT_URL=${PROJECT_URL}
            - PORT=3000
            - TAG_VERSION=${TAG_VERSION}
            - CI_BRANCH_NAME=${CI_BRANCH_NAME}
            - POSTGRES_URL=${SERVER_POSTGRES_URL}
        ports:
            - "3000:3000"
        volumes:
            - ./logs:/var/log/nginx/
        networks:
            - site15-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "npx wait-on --timeout=160000 --interval=1000 --window --verbose --log http://localhost:3000/api/version/check-tag/$TAG_VERSION?healthcheck=true",
                ]
            interval: 30s
            timeout: 10s
            retries: 10
        tty: true
        depends_on:
            site15-postgres:
                condition: service_healthy
